<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:linear-gradient(135deg,#4f46e5,#7c3aed,#2563eb);
    }

    .login-container{
      width:350px;
      background:#fff;
      padding:35px;
      border-radius:18px;
      box-shadow:0 15px 35px rgba(0,0,0,.2);
      text-align:center;
    }

    .login-container h2{
      color:#333;
      margin-bottom:8px;
    }

    .login-container p{
      color:#777;
      font-size:14px;
      margin-bottom:25px;
    }

    .input-group{
      margin-bottom:18px;
      text-align:left;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      color:#555;
      font-size:14px;
      font-weight:bold;
    }

    .input-group input{
      width:100%;
      padding:12px 15px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
      transition:.3s;
      font-size:15px;
    }

    .input-group input:focus{
      border-color:#4f46e5;
      box-shadow:0 0 8px rgba(79,70,229,.25);
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      font-size:14px;
    }

    .options a{
      text-decoration:none;
      color:#4f46e5;
    }

    .options a:hover{
      text-decoration:underline;
    }

    button{
      width:100%;
      padding:13px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#4338ca;
      transform:translateY(-2px);
    }

    @media(max-width:400px){
      .login-container{
        width:90%;
        padding:25px;
      }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Bem-vindo 👋</h2>
    <p>Entre com sua conta para continuar</p>

    <form action="/login" method="post">

      <div class="input-group">
        <label for="user">User</label>
        <input
          type="user"
          id="email"
          name="usuario"
          placeholder="Digite seu nome de usuario"
          required
        >
      </div>

      <div class="input-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          name="senha"
          placeholder="Digite sua senha"
          required
        >
      </div>

      {% if erro_login %}
      <div>{{ erro_login }}</div>
      {% endif %}

      <div class="options">
        <label>
          <input type="checkbox">
          Lembrar-me
        </label>

        <a href="/esqueci-senha">Esqueceu a senha?</a>
      </div>

      <button type="submit">Entrar</button>

    </form>

  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bem-vindo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4f46e5,#2563eb,#0ea5e9);
}

.container{
    width:380px;
    background:#fff;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    animation:fadeIn .8s ease;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#2563eb;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    font-weight:bold;
    margin:0 auto 20px;
}

h1{
    color:#222;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:30px;
    line-height:1.5;
}

.actions{
    display:flex;
    flex-direction:column;
    gap:15px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.btn-login{
    background:#2563eb;
    color:#fff;
}

.btn-login:hover{
    background:#1d4ed8;
}

.btn-password{
    background:#f59e0b;
    color:#fff;
}

.btn-password:hover{
    background:#d97706;
}

.btn-logout{
    background:#ef4444;
    color:#fff;
}

.btn-logout:hover{
    background:#dc2626;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="logo">
        S
    </div>

    <h1>Bem-vindo!</h1>

    <p>
        Seja bem-vindo ao sistema.<br>
        Escolha uma das opções abaixo.
    </p>

    <div class="actions">
        <button class="btn-password" onclick="window.location.href='/trocar-senha'">
            🔑 Trocar Senha
        </button>

        <button class="btn-logout" onclick="window.location.href='/'">
            Login
        </button>
    </div>

</div>

</body>
</html>
